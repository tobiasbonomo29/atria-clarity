name: Actualizar Contenido desde Notion

on:
  workflow_dispatch:  # Permite ejecución manual

permissions:
  contents: write  # Necesario para hacer commit y push

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Fetch content from Notion
        run: npm run fetch-notion
        env:
          VITE_NOTION_API_KEY: ${{ secrets.VITE_NOTION_API_KEY }}
          VITE_NOTION_BLOG_DATABASE_ID: ${{ secrets.VITE_NOTION_BLOG_DATABASE_ID }}
          VITE_NOTION_FAQ_DATABASE_ID: ${{ secrets.VITE_NOTION_FAQ_DATABASE_ID }}

      - name: Commit and push if changed
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add src/data/blog.json src/data/faqs.json
          git diff --staged --quiet || git commit -m "🔄 Actualizar contenido desde Notion"
          git push
